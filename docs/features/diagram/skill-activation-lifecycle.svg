<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 1440">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.6"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
      .title { fill: #e2e8f0; font-size: 22px; font-weight: 700; }
      .subtitle { fill: #94a3b8; font-size: 11px; }
      .node-title { fill: #f8fafc; font-size: 13px; font-weight: 700; }
      .node-text { fill: #cbd5e1; font-size: 10px; }
      .label { fill: #fbbf24; font-size: 9px; font-weight: 600; }
    </style>
  </defs>

  <rect width="1160" height="1440" fill="#0f172a"/>
  <rect width="1160" height="1440" fill="url(#grid)"/>

  <text x="36" y="42" class="title">Skill 从发现到下一轮生效的生命周期</text>
  <text x="36" y="64" class="subtitle">对应代码：core/skills/registry.py / core/skills/runtime.py / core/tools/builtin/skill.py / core/prompt/assembler.py / core/session/commands.py</text>

  <rect x="400" y="90" width="360" height="58" rx="26" fill="#0f172a"/>
  <rect x="400" y="90" width="360" height="58" rx="26" fill="rgba(59,130,246,0.30)" stroke="#60a5fa" stroke-width="1.6"/>
  <text x="580" y="126" text-anchor="middle" class="node-title">SessionEngine.bootstrap()</text>

  <rect x="380" y="186" width="400" height="96" rx="12" fill="#0f172a"/>
  <rect x="380" y="186" width="400" height="96" rx="12" fill="rgba(120,53,15,0.30)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="580" y="220" text-anchor="middle" class="node-title">SkillRegistry.discover()</text>
  <text x="580" y="244" text-anchor="middle" class="node-text">只扫描 .harness/skills/*/SKILL.md 的 frontmatter</text>
  <text x="580" y="266" text-anchor="middle" class="node-text">得到 skill_catalog + skills_revision</text>

  <rect x="380" y="328" width="400" height="92" rx="12" fill="#0f172a"/>
  <rect x="380" y="328" width="400" height="92" rx="12" fill="rgba(8,51,68,0.36)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="580" y="362" text-anchor="middle" class="node-title">PromptAssembler.build_stable()</text>
  <text x="580" y="386" text-anchor="middle" class="node-text">把 skill_catalog 渲染成 &lt;available-skills&gt;</text>
  <text x="580" y="408" text-anchor="middle" class="node-text">这里还没有正文，只告诉模型“有哪些 skill 可用”</text>

  <g transform="translate(580, 500)">
    <polygon points="0,-40 100,0 0,40 -100,0" fill="#0f172a"/>
    <polygon points="0,-40 100,0 0,40 -100,0" fill="rgba(120,53,15,0.30)" stroke="#fbbf24" stroke-width="1.6"/>
    <text y="-4" text-anchor="middle" class="node-title">谁来激活？</text>
    <text y="16" text-anchor="middle" class="node-text">模型 tool 调用 / 用户命令</text>
  </g>

  <rect x="80" y="594" width="360" height="144" rx="12" fill="#0f172a"/>
  <rect x="80" y="594" width="360" height="144" rx="12" fill="rgba(6,78,59,0.34)" stroke="#34d399" stroke-width="1.5"/>
  <text x="260" y="628" text-anchor="middle" class="node-title">模型路径：skill 工具</text>
  <text x="260" y="652" text-anchor="middle" class="node-text">skill.handle()</text>
  <text x="260" y="674" text-anchor="middle" class="node-text">registry.load(skill_id)</text>
  <text x="260" y="696" text-anchor="middle" class="node-text">build_invoked_skill_record()</text>
  <text x="260" y="718" text-anchor="middle" class="node-text">返回 SessionUpdate(INVOKE_SKILL, payload={"invoked_skill": record})</text>

  <rect x="720" y="594" width="360" height="144" rx="12" fill="#0f172a"/>
  <rect x="720" y="594" width="360" height="144" rx="12" fill="rgba(76,29,149,0.30)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="900" y="628" text-anchor="middle" class="node-title">用户路径：/skills use</text>
  <text x="900" y="652" text-anchor="middle" class="node-text">commands.py → apply_skill_invocation()</text>
  <text x="900" y="674" text-anchor="middle" class="node-text">直接把 record 写入 state.invoked_skills</text>
  <text x="900" y="696" text-anchor="middle" class="node-text">并追加 SkillEvent(source="user_command")</text>

  <rect x="380" y="810" width="400" height="118" rx="12" fill="#0f172a"/>
  <rect x="380" y="810" width="400" height="118" rx="12" fill="rgba(30,41,59,0.56)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="580" y="844" text-anchor="middle" class="node-title">SkillRegistry.load() + build_skill_runtime_body()</text>
  <text x="580" y="868" text-anchor="middle" class="node-text">读取正文和 references，渲染成 record.content</text>
  <text x="580" y="890" text-anchor="middle" class="node-text">当前 XML 形状是：&lt;skill-runtime&gt;&lt;skill id="..." source="local-inline"&gt;...</text>
  <text x="580" y="912" text-anchor="middle" class="node-text">并做 inline budget 校验</text>

  <rect x="380" y="976" width="400" height="96" rx="12" fill="#0f172a"/>
  <rect x="380" y="976" width="400" height="96" rx="12" fill="rgba(120,53,15,0.30)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="580" y="1010" text-anchor="middle" class="node-title">reducer / 命令路径完成写入</text>
  <text x="580" y="1034" text-anchor="middle" class="node-text">state.invoked_skills[skill_id] = record</text>
  <text x="580" y="1056" text-anchor="middle" class="node-text">这时长期真相已经进入 SessionState</text>

  <rect x="380" y="1120" width="400" height="98" rx="12" fill="#0f172a"/>
  <rect x="380" y="1120" width="400" height="98" rx="12" fill="rgba(6,78,59,0.34)" stroke="#34d399" stroke-width="1.5"/>
  <text x="580" y="1154" text-anchor="middle" class="node-title">下一轮 PromptAssembler.build_runtime_context()</text>
  <text x="580" y="1178" text-anchor="middle" class="node-text">读取 state.invoked_skills，渲染 &lt;active-skills&gt;</text>
  <text x="580" y="1200" text-anchor="middle" class="node-text">完整 skill 内容现在才真正进入模型输入</text>

  <rect x="380" y="1268" width="400" height="76" rx="12" fill="#0f172a"/>
  <rect x="380" y="1268" width="400" height="76" rx="12" fill="rgba(59,130,246,0.28)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="580" y="1300" text-anchor="middle" class="node-title">模型按新 skill 继续工作</text>
  <text x="580" y="1322" text-anchor="middle" class="node-text">“本轮激活，下一轮生效” 就是这里的轮次边界</text>

  <rect x="146" y="834" width="180" height="86" rx="12" fill="rgba(15,23,42,0.92)" stroke="#334155" stroke-width="1"/>
  <text x="236" y="866" text-anchor="middle" class="node-title" style="font-size:12px">模型路径的关键点</text>
  <text x="236" y="888" text-anchor="middle" class="node-text">工具不直接写状态</text>
  <text x="236" y="908" text-anchor="middle" class="node-text">而是先返回 updates</text>

  <rect x="826" y="834" width="198" height="86" rx="12" fill="rgba(15,23,42,0.92)" stroke="#334155" stroke-width="1"/>
  <text x="925" y="866" text-anchor="middle" class="node-title" style="font-size:12px">用户命令路径的关键点</text>
  <text x="925" y="888" text-anchor="middle" class="node-text">不经过 QueryLoop</text>
  <text x="925" y="908" text-anchor="middle" class="node-text">但最终写到同一份 invoked_skills</text>

  <line x1="580" y1="148" x2="580" y2="186" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="580" y1="282" x2="580" y2="328" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="580" y1="420" x2="580" y2="460" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="480" y1="500" x2="260" y2="500" stroke="#94a3b8" stroke-width="2"/>
  <line x1="260" y1="500" x2="260" y2="594" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="356" y="488" class="label">模型</text>
  <line x1="680" y1="500" x2="900" y2="500" stroke="#94a3b8" stroke-width="2"/>
  <line x1="900" y1="500" x2="900" y2="594" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="780" y="488" class="label">用户</text>
  <line x1="260" y1="738" x2="260" y2="810" stroke="#94a3b8" stroke-width="2"/>
  <line x1="260" y1="810" x2="380" y2="810" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="900" y1="738" x2="900" y2="810" stroke="#94a3b8" stroke-width="2"/>
  <line x1="900" y1="810" x2="780" y2="810" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="580" y1="928" x2="580" y2="976" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="580" y1="1072" x2="580" y2="1120" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="580" y1="1218" x2="580" y2="1268" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
